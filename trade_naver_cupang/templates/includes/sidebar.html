<!-- 사이드바 초기 상태 설정 -->
<script>
    // 페이지 로드 전에 메뉴 상태 복원
    (function() {
        const currentPath = window.location.pathname;
        // 로그인 후 첫 진입인지 확인 (대시보드 페이지이고 메뉴 상태가 없는 경우)
        const isFirstLogin = currentPath === '/dashboard' && !localStorage.getItem('sidebarMenuState');
        
        if (!isFirstLogin) {
            const menuState = localStorage.getItem('sidebarMenuState');
            if (menuState) {
                const expandedMenus = JSON.parse(menuState);
                // CSS 클래스를 미리 설정하기 위한 스타일 태그 추가
                const style = document.createElement('style');
                let css = '';
                expandedMenus.forEach(menuId => {
                    css += `#${menuId} { max-height: 400px !important; opacity: 1 !important; visibility: visible !important; } `;
                    css += `#${menuId} ~ .menu-item.has-submenu::after { content: '−' !important; } `;
                });
                style.textContent = css;
                document.head.appendChild(style);
            }
        }
        
        // 페이지 로드 완료 후 transition 활성화
        window.addEventListener('load', function() {
            document.body.classList.add('loaded');
        });
    })();
</script>
