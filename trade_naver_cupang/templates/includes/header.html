<!-- 헤더 -->
<header class="header">
   <div class="header-left">
         <div class="search-box">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
               <circle cx="11" cy="11" r="8"></circle>
               <path d="m21 21-4.35-4.35"></path>
            </svg>
            <input type="text" placeholder="주문번호, 상품명, 고객명으로 검색">
         </div>
   </div>
   
   <div class="header-right">
         <button class="theme-toggle-btn" id="themeToggleBtn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
               <circle cx="12" cy="12" r="5"></circle>
               <path d="M12 1v6M12 17v6M4.22 4.22l4.24 4.24M15.54 15.54l4.24 4.24M1 12h6M17 12h6M4.22 19.78l4.24-4.24M15.54 8.46l4.24-4.24"></path>
            </svg>
         </button>
         <button class="notification-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
               <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
               <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <span class="notification-badge"></span>
         </button>
         
         <div class="user-menu">
            <div class="user-info">
               <div class="user-name">{{ session.get('username', 'Guest') }}</div>
               <div class="user-role">{{ session.get('role', 'Unknown') }}</div>
            </div>
            <div class="user-avatar">{{ session.get('username', 'G')[0].upper() }}</div>
         </div>
         
         <a href="{{ url_for('main.logout') }}" class="logout-btn">로그아웃</a>
   </div>
</header>
