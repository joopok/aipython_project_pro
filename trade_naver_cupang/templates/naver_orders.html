<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow - 네이버 주문 관리</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common_sidebar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/naver_orders.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/spinner.css') }}">
</head>
<body data-theme="light">
    {% include 'includes/sidebar.html' %}

    <!-- 메인 컨텐츠 -->
    <main class="main-content" id="mainContent">
        {% include 'includes/header.html' %}

        <!-- 컨텐츠 -->
        <div class="content">
            <!-- 페이지 헤더 -->
            <div class="page-header">
                <h1 class="page-title">네이버 주문 관리</h1>
                <p class="page-description">네이버 스마트스토어의 주문을 관리하고 처리하세요</p>
            </div>

            <!-- 필터 섹션 -->
            <div class="filter-section">
                <div class="filter-row">
                    <div class="filter-group">
                        <label>주문일자</label>
                        <div class="date-range">
                            <input type="date" id="startDate" class="form-control">
                            <span class="date-separator">~</span>
                            <input type="date" id="endDate" class="form-control">
                        </div>
                    </div>
                    <div class="filter-group">
                        <label>주문상태</label>
                        <select id="orderStatus" class="form-control">
                            <option value="">전체</option>
                            <option value="PAYED">결제완료</option>
                            <option value="DELIVERING">배송중</option>
                            <option value="DELIVERED">배송완료</option>
                            <option value="PURCHASE_DECIDED">구매확정</option>
                            <option value="CANCELED">취소</option>
                            <option value="RETURNED">반품</option>
                            <option value="EXCHANGED">교환</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>검색</label>
                        <input type="text" id="searchText" class="form-control" placeholder="주문번호, 상품명, 구매자명">
                    </div>
                    <div class="filter-actions">
                        <button class="btn btn-primary" onclick="searchOrders()">조회</button>
                        <button class="btn btn-secondary" onclick="resetFilters()">초기화</button>
                    </div>
                </div>
            </div>
            <!-- 동기화 헤더 -->

            <!-- 통계 카드 -->
            <div class="stats-cards">
                <div class="stat-card">
                    <div class="stat-icon blue">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">전체 주문</div>
                        <div class="stat-value" id="totalOrders">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">신규 주문</div>
                        <div class="stat-value" id="newOrders">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">배송중</div>
                        <div class="stat-value" id="deliveringOrders">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon red">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">클레임</div>
                        <div class="stat-value" id="claimOrders">0</div>
                    </div>
                </div>
            </div>

            <!-- 주문 테이블 -->
            <div class="table-container">
                <div class="table-header">
                    <div>
                        <h2 class="table-title">주문 목록</h2>
                        <span class="result-count"><span id="totalCount">0</span>건 조회됨</span>
                    </div>
                    <div class="table-actions">
                        <button class="action-btn" onclick="syncOrders()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                            </svg>
                            네이버커머스 동기화
                        </button>
                        <button class="action-btn excel" onclick="exportOrders()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                            </svg>
                            엑셀 다운로드
                        </button>
                    </div>
                </div>

                <div class="excel-table-wrapper">
                    <table class="excel-table">
                        <thead>
                            <tr>
                                <th class="col-check">
                                    <div class="checkbox-wrapper">
                                        <input type="checkbox" id="selectAll">
                                    </div>
                                </th>
                                <th class="col-date">주문일시</th>
                                <th class="col-order-no">상품주문번호</th>
                                <th class="col-product">상품명</th>
                                <th class="col-option">옵션</th>
                                <th class="col-qty">수량</th>
                                <th class="col-orderer">주문자</th>
                                <th class="col-amount">결제금액</th>
                                <th class="col-status">주문상태</th>
                                <th class="col-tracking">송장번호</th>
                                <th class="col-action">작업</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTableBody">
                            <!-- 동적으로 생성됨 -->
                        </tbody>
                    </table>
                    
                    <div class="table-empty" id="emptyMessage" style="display: none;">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="#e0e0e0">
                            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/>
                        </svg>
                        <p>조회된 주문이 없습니다.</p>
                    </div>
                </div>

                <!-- 페이지네이션 -->
                <div class="table-pagination">
                    <div class="pagination-info">
                        1-20 of <span id="totalRecords">0</span> 건
                    </div>
                    <div class="pagination-controls" id="pagination">
                        <!-- 동적으로 생성됨 -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 주문 상태 변경 모달 -->
    <div class="modal-overlay" id="statusModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">주문 상태 변경</h3>
                <button class="modal-close" onclick="closeStatusModal()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>상품주문번호</label>
                    <input type="text" id="modalOrderId" class="form-control" readonly>
                </div>
                <div class="form-group">
                    <label>변경할 상태</label>
                    <select id="modalStatus" class="form-control">
                        <option value="PAYED">결제완료</option>
                        <option value="DELIVERING">배송중</option>
                        <option value="DELIVERED">배송완료</option>
                        <option value="PURCHASE_DECIDED">구매확정</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeStatusModal()">취소</button>
                <button class="btn btn-primary" onclick="updateOrderStatus()">변경</button>
            </div>
        </div>
    </div>

    <!-- 송장 입력 모달 -->
    <div class="modal-overlay" id="trackingModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">송장 정보 입력</h3>
                <button class="modal-close" onclick="closeTrackingModal()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>상품주문번호</label>
                    <input type="text" id="trackingOrderId" class="form-control" readonly>
                </div>
                <div class="form-group">
                    <label>택배사</label>
                    <select id="deliveryCompany" class="form-control">
                        <option value="CJGLS">CJ대한통운</option>
                        <option value="HANJIN">한진택배</option>
                        <option value="LOTTE">롯데택배</option>
                        <option value="POST">우체국택배</option>
                        <option value="LOGEN">로젠택배</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>송장번호</label>
                    <input type="text" id="trackingNumber" class="form-control" placeholder="송장번호 입력">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeTrackingModal()">취소</button>
                <button class="btn btn-primary" onclick="updateTracking()">저장</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/common_sidebar.js') }}"></script>
    <script src="{{ url_for('static', filename='js/spinner_manager.js') }}"></script>
    <script src="{{ url_for('static', filename='js/debug_spinner.js') }}"></script>
    <script src="{{ url_for('static', filename='js/theme_toggle.js') }}"></script>
    <script src="{{ url_for('static', filename='js/naver_orders.js') }}"></script>
</body>
</html>
